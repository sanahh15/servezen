<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><h1><i>ServeZen</i></h1></title>
    
    

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background-color: #faf4f4;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
        }

        .navbar-brand {
            font-weight: bold;
            color: #fff !important;
        }

        .btn-outline-light, .btn-light {
            border-radius: 20px;
        }
        @media (max-width: 768px) {
   .cards {
      flex-direction: column;
   }
}
    </style>
</head>

<body>

<!-- NAVBAR -->
<header>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        
        <a class="navbar-brand" href="{{ url_for('home.home') }}">ServeZen</a>

        <div>
            {% if current_user.is_authenticated %}
                <span class="navbar-text text-white me-3">
                    Hello, {{ current_user.name }}!
                </span>
                <a class="btn btn-outline-light" href="{{ url_for('auth.logout') }}">Logout</a>
            {% else %}
                <a class="btn btn-outline-light me-2" href="{{ url_for('auth.login') }}">Login</a>
                <a class="btn btn-light" href="{{ url_for('auth.register') }}">Register</a>
            {% endif %}
        </div>

    </div>
</nav>
</header>

<!-- PAGE CONTENT WILL COME HERE -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
