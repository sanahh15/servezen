<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServeZen</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f4f6fb;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        /* Navbar Styling */
        .navbar {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            padding: 12px 0;
        }

        .navbar-brand {
    font-size: 30px;
    font-weight: 700;
    font-style: italic;
    background: linear-gradient(90deg, #ffffff, #d3f09a);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
}

        .navbar-text {
            font-size: 14px;
        }

        .btn-outline-light, .btn-light {
            border-radius: 20px;
            font-size: 14px;
        }
        /* ===== DARK MODE (PREMIUM COLORS) ===== */
.dark-mode {
    background: #0b1220 !important;   /* deep blue-black */
    color: #e2e8f0 !important;        /* soft white text */
}

/* ===== NAVBAR ===== */
.dark-mode .navbar {
    background: linear-gradient(90deg, #020617, #0f172a);
}

/* ===== SIDEBAR ===== */
.dark-mode .sidebar {
    background: #020617;
}

/* ===== CARDS / BOXES ===== */
.dark-mode .card,
.dark-mode .header,
.dark-mode .service-card,
.dark-mode .table-box,
.dark-mode .stat-card {
    background: #111827 !important;
    color: #e5e7eb;
    border: 1px solid #1f2937;
    box-shadow: none;
}

/* ===== TEXT ===== */
.dark-mode h1,
.dark-mode h2,
.dark-mode h3,
.dark-mode h4 {
    color: #f9fafb;
}

.dark-mode p,
.dark-mode small {
    color: #9ca3af;
}

/* ===== BUTTONS ===== */
.dark-mode .btn-book {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
}

/* ===== TABLE ===== */
.dark-mode th {
    background: #1f2937;
    color: #9ca3af;
}

.dark-mode td {
    border-bottom: 1px solid #1f2937;
}

/* ===== STATUS COLORS ===== */
.dark-mode .booked {
    background: #eab308;
    color: black;
}

.dark-mode .completed {
    background: #22c55e;
    color: white;
}

.dark-mode .cancelled {
    background: #ef4444;
    color: white;
}
/* ===== GLASS EFFECT ===== */
.glass {
    background: rgba(255, 255, 255, 0.08);  /* transparent white */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.15);

    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
/* Dark mode glass */
.dark-mode .glass {
    background: rgba(17, 24, 39, 0.6);
    border: 1px solid rgba(255,255,255,0.08);
}
    </style>
</head>

<body>

<!-- NAVBAR -->
<header>
<nav class="navbar navbar-expand-lg navbar-dark">
    
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center",glass>

        <a class="navbar-brand" href="{{ url_for('home.home') }}">
    ServeZen
</a>

        <!-- RIGHT SIDE -->
        <div class="d-flex align-items-center",glass>
            {% if current_user.is_authenticated %}
                <span class="navbar-text text-white me-3">
                    Hello, {{ current_user.name }} 👋
                </span>
                <a class="btn btn-outline-light btn-sm" href="{{ url_for('auth.logout') }}">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
            {% else %}
                <a class="btn btn-outline-light btn-sm me-2" href="{{ url_for('auth.login') }}">
                    Login
                </a>
                <a class="btn btn-light btn-sm" href="{{ url_for('auth.register') }}">
                    Register
                </a>
            {% endif %}
            <button id="darkToggle" class="btn btn-sm btn-light ms-2">
    🌙
</button>
        </div>

    </div>

</nav>
</header>

<!-- PAGE CONTENT -->
<div class="container-fluid px-4 mt-3">
    {% block content %}{% endblock %}
</div>
<script>
document.getElementById("darkToggle").onclick = function() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
