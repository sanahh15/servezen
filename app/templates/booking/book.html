{% extends "base.html" %}

{% block content %}

<style>
    body {
        background: #f4f6fb;
    }

    .booking-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
    }

    .booking-card {
        background: #ffffff;
        padding: 30px;
        border-radius: 15px;
        width: 400px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        animation: fadeIn 0.4s ease-in-out;
    }

    .booking-card h2 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: 600;
        color: #1e3c72;
    }

    label {
        font-weight: 500;
        margin-top: 10px;
        display: block;
    }

    select, input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ddd;
        outline: none;
        transition: 0.2s;
    }

    select:focus, input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 5px rgba(37,99,235,0.3);
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        font-weight: 500;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.03);
        box-shadow: 0 5px 15px rgba(37,99,235,0.3);
    }

    .back-link {
        text-align: center;
        margin-top: 15px;
    }

    .back-link a {
        text-decoration: none;
        color: #2563eb;
        font-size: 14px;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<div class="booking-container">

    <div class="booking-card">

        <h2>🏥 Book Appointment</h2>

        <form method="POST">

            <!-- SERVICE -->
            <label>Service</label>
            <select name="service_id" required>
                {% for service in services %}
                <option value="{{ service.id }}"
                    {% if selected_service == service.id|string %}selected{% endif %}>
                    {{ service.name }} - ₹{{ service.price }}
                </option>
                {% endfor %}
            </select>

            <!-- DATE -->
            <label>Select Date</label>
            <input type="date" name="date" required>

            <!-- BUTTON -->
            <button type="submit">
                Confirm Booking
            </button>

        </form>

        <!-- BACK -->
        <div class="back-link">
            <a href="{{ url_for('home.dashboard') }}">← Back to Dashboard</a>
        </div>

    </div>

</div>

{% endblock %}
