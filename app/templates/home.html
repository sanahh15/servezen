<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servezen - Hospital Booking</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            background-color: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
        }

        .navbar-brand {
            color: #fff !important;
            font-weight: bold;
        }

        /* Hero Section */
        .hero {
            background: url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3') no-repeat center center/cover;
            height: 350px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero h1 {
            background: rgba(0,0,0,0.5);
            padding: 15px 25px;
            border-radius: 10px;
        }

        /* Services */
        .service-card {
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
        }

        .card-title {
            font-weight: bold;
            color: #2a5298;
        }

        .btn-primary {
            background-color: #2a5298;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1e3c72;
        }
        @media (max-width: 768px) {
   .cards {
      flex-direction: column;
   }
}
    </style>
</head>

<body>

<!-- Navbar -->
 <header>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#"><h1><i>ServeZen</i></h1></a>
        <div>
            <a href="/login" class="btn btn-outline-light me-2">Login</a>
            <a href="/register" class="btn btn-light">Register</a>
        </div>
    </div>
</nav>
</header>   

<!-- Hero Section -->
<div class="hero">
    <h1><i>🏥 Book Your Doctor Appointment Easily</i></h1>
</div>

<!-- Services Section -->
<div class="container mt-5">

    <h2 class="text-center mb-5 fw-bold text-primary">
        🏥 Available Services
    </h2>

    <div class="row g-4">

        {% for service in services %}
        <div class="col-md-4">

            <div class="card service-card h-100 border-0 shadow-lg">

                <!-- Header Color Strip -->
                <div class="service-header"></div>

                <div class="card-body text-center p-4">

                    <h5 class="card-title fw-bold text-dark">
                        {{ service[1] }}
                    </h5>

                    <p class="text-muted">
                        {{ service[2] }}
                    </p>

                    <div class="price-badge mb-3">
                        ₹ {{ service[3] }}
                    </div>

                    <a href="#" class="btn btn-book w-100">
                        Book Appointment
                    </a>

                </div>
            </div>

        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
