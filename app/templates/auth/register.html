
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Servezen</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4)),
    url('/static/images/serve.jpeg') no-repeat center center/cover;
}

/* CENTER CARD */
.wrapper {
    width: 100%;
    max-width: 450px;
    padding: 20px;
}

/* GLASS CARD */
.card-box {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    padding: 35px;
    color: white;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* TITLE */
.card-box h2 {
    text-align: center;
    font-weight: 700;
    margin-bottom: 8px;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #d1d5db;
    margin-bottom: 25px;
}

/* INPUT */
.form-label {
    font-size: 13px;
    color: #e5e7eb;
}

.input-group-text {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
}

.form-control {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    border-radius: 10px;
}

.form-control::placeholder {
    color: #d1d5db;
}

.form-control:focus {
    box-shadow: none;
    border: 1px solid #60a5fa;
    background: rgba(255,255,255,0.2);
}

/* BUTTON */
.btn-custom {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-weight: 600;
    transition: 0.3s;
}

.btn-custom:hover {
    transform: scale(1.03);
    box-shadow: 0 5px 15px rgba(37,99,235,0.4);
}

/* FOOTER */
.bottom-text {
    text-align: center;
    margin-top: 18px;
    font-size: 14px;
    color: #e5e7eb;
}

.bottom-text a {
    color: #ea2e08;
    text-decoration: none;
}

.bottom-text a:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="wrapper">

    <div class="card-box">

        <h2><i >📝 Register Account</i></h2>
        <div class="subtitle">Join Servezen and get started</div>

        <form method="POST" action="{{ url_for('auth.register') }}">

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" name="name" placeholder="Enter username" required>
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" name="email" placeholder="Enter email" required>
                </div>
            </div>  
     
            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Enter password" required>
                </div>
            </div>
                   {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <p style="color:red;">
        {{ message }}
      </p>
    {% endfor %}
  {% endif %}
{% endwith %}

            <!-- Button -->
            <button type="submit" class="btn btn-custom w-100">
                Register
            </button>

        </form>

        <div class="bottom-text">
            Already have an account?
            <a href="{{ url_for('auth.login') }}">Login</a>
        </div>

    </div>

</div>

</body>
</html>
