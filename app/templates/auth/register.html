<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Servezen</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url('/static/images/serve.jpeg') no-repeat center center fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Segoe UI', sans-serif;
        }

        .register-container {

                       background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);  /* for Safari */
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.3); /* subtle border */
    padding: 40px 30px;
    width: 400px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
            
        }

        .register-card {
            width: 380px;
            border-radius: 15px;
            border: none;
        }

        .register-card h2 {
            font-weight: bold;
            color: #2a5298;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-primary {
            background-color: #2a5298;
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #1e3c72;
        }

        .form-label {
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center register-container">
    
    <div class="card register-card shadow p-4">
        
        <h2 class="text-center mb-4">REGISTER</h2>

        <form method="POST" action="{{ url_for('auth.register') }}">
            
            <div class="mb-3">
                <label for="name" class="form-label">Username</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Register</button>

        </form>

        <p class="text-center mt-3">
            Already have an account? 
            <a href="{{ url_for('auth.login') }}">Login</a>
        </p>

    </div>

</div>

</body>
</html>
