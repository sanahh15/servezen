<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>
/* Background */
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #dbeafe, #e0e7ff);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass Card */
.auth-card {
    width: 100%;
    max-width: 400px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    text-align: center;
}

/* Heading */
.auth-card h2 {
    margin-bottom: 10px;
    color: #1e3a8a;
}

.auth-card p {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
    outline: none;
    font-size: 14px;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #2563eb, #1e3a8a);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
}

/* Link */
a {
    display: block;
    margin-top: 15px;
    color: #2563eb;
    text-decoration: none;
    font-size: 14px;
}

a:hover {
    text-decoration: underline;
}
</style>

</head>
<body>

<div class="auth-card">
    <h2>🔑 Reset Password</h2>
    <p>Enter your new password</p>

    <form method="POST">
        <input type="password" name="password" placeholder="New Password" required>
        <button type="submit">Reset Password</button>
    </form>

    <a href="{{ url_for('auth.login') }}">Back to Login</a>
</div>

</body>
</html>
