{% extends "base.html" %}

{% block content %}

<style>

/* ===== LAYOUT ===== */
.admin-container {
    display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 220px;
    background: #1e293b;
    color: white;
    position: fixed;
    top: 70px;
    left: 0;
    height: calc(100vh - 70px);
    padding: 20px;
}

.sidebar h3 {
    margin-bottom: 20px;
    font-size: 18px;
}

.sidebar a {
    display: block;
    padding: 10px;
    color: #cbd5e1;
    text-decoration: none;
    border-radius: 6px;
    margin-bottom: 10px;
}

.sidebar a:hover {
    background: #334155;
    color: white;
}

/* ===== MAIN ===== */
.main {
    margin-left: 220px;
    margin-top: 70px;
    width: 100%;
    padding: 30px;
    background: #f4f6fb;
}

/* ===== HEADER BOX ===== */
.title-box {
    background: #eef2f7;
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 22px;
    font-weight: 600;
    width: fit-content;
    margin-bottom: 20px;
}

/* ===== WELCOME ===== */
.welcome {
    margin-bottom: 20px;
    color: #6b7280;
}

/* ===== CARDS ===== */
.cards {
    display: flex;
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 200px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.card h5 {
    color: #64748b;
    font-size: 14px;
    margin-bottom: 10px;
}

.card p {
    font-size: 24px;
    font-weight: bold;
    margin: 0;
}

</style>

<div class="admin-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>⚙ Admin Panel</h3>
        <a href="/admin/dashboard">🏠 Dashboard</a>
        <a href="#">👥 Users</a>
        <a href="#">📦 Services</a>
        <a href="#">📋 Bookings</a>
        <a href="{{ url_for('auth.logout') }}">🚪 Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <div class="title-box">Admin Dashboard</div>

        <div class="welcome">
            Welcome, <b>{{ current_user.name }}</b> 👋
        </div>

        <div class="cards">

            <div class="card">
                <h5>Total Bookings</h5>
                <p>{{ bookings|length }}</p>
            </div>

            <div class="card">
                <h5>Total Users</h5>
                <p>{{ users|length }}</p>
            </div>

            <div class="card">
                <h5>Total Services</h5>
                <p>{{ services|length }}</p>
            </div>

        </div>

    </div>

</div>

{% endblock %}
